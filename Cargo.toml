[workspace]
resolver = "2"
members = [
    "crates/nyx-agent",
    "crates/nyx-agent-types",
    "crates/nyx-agent-core",
    "crates/nyx-agent-nyx",
    "crates/nyx-agent-ai",
    "crates/nyx-agent-sandbox",
    "crates/nyx-agent-api",
    "crates/nyx-agent-ui",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.83"
license = "LicenseRef-PolyForm-Small-Business-1.0.0"
repository = "https://github.com/nyx/nyx-pro"

[workspace.dependencies]
tokio = { version = "1.42", features = ["full"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
rusqlite = { version = "0.32", features = ["bundled"] }
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
toml = "0.8"
dirs = "5"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
rust-embed = "8"
rayon = "1"
ts-rs = "10"
utoipa = "5"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
