schedule = []

[general]
log_level = "info"

[performance]
max_parallel_scans = 4
scan_timeout_secs = 600

[sandbox]
enabled = true
allow_network = false
backend = "auto"

[ai]
runtime = "none"
max_concurrent_one_shot = 4

[ai.pricing]

[ui]
listen_addr = "127.0.0.1:8765"
open_browser = true

[triggers]
on_push = false
on_pr = false

[nyx]

[run]
replay_stable_check = false
allow_state_changing_live_probes = false
browser_checks_enabled = false
exploit_mode_enabled = false
exploit_dry_run = false
business_logic_templates_enabled = true
business_logic_template_ids = []
exploit_reset_after_state_changing = true
enable_zap_baseline = true
enable_nuclei = true
enable_trivy = true
enable_osv_scanner = true
enable_secret_scanning = true
enable_katana = true
enable_httpx = true
enable_aggressive_sqlmap = false

[env]

[[project]]
name = "example-app"
description = "Example multi-repo product"
target_base_url = "http://localhost:3000"

[project.launch]
mode = "auto"
target_urls = ["http://localhost:3000"]

[[project.launch.health]]
url = "http://localhost:3000/health"
timeout_secs = 60

[[project.launch.seed]]
command = "npm run seed:test"
repo = "example-backend"

[[project.launch.reset]]
command = "npm run db:reset"
repo = "example-backend"

[[project.repo]]
name = "example-backend"
i_own_this = true
enabled = true

[project.repo.source]
kind = "local-path"
path = "/path/to/backend"

[[project.repo]]
name = "example-frontend"
i_own_this = true
enabled = true

[project.repo.source]
kind = "local-path"
path = "/path/to/frontend"
