name: Feature request
description: Suggest a Nyctos capability, workflow, integration, or UX improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Nyctos cannot do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Commands, API shapes, screenshots, or examples are welcome.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / scan orchestration
        - Dashboard / frontend
        - API / integrations
        - Setup / onboarding
        - Live verification
        - Unsafe attack agent
        - Sandbox / env-builder
        - AI runtime / prompts
        - Reports / PR comments
        - GitHub Action / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they do not fit.
  - type: textarea
    id: extra
    attributes:
      label: Additional context
