name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo nextest
        run: cargo nextest run --workspace
      - name: ts-bindings up-to-date
        run: |
          cargo build -p nyx-agent-types
          git diff --exit-code frontend/src/api/types.gen.ts
      - name: missing-instrument lint
        run: bash .ci/missing-instrument.sh

  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: license guard
        run: ./.ci/license-guard.sh
      - name: voice lint
        run: ./.ci/voice-lint.sh
