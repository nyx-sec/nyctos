name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo nextest
        run: cargo nextest run --workspace
      - name: ts-bindings up-to-date
        run: |
          cargo build -p nyctos-types
          git diff --exit-code frontend/src/api/types.gen.ts
      - name: missing-instrument lint
        run: bash .ci/missing-instrument.sh
      - name: sqlx cache up-to-date
        run: |
          rm -f /tmp/sqlx-prepare.db
          export DATABASE_URL="sqlite:///tmp/sqlx-prepare.db?mode=rwc"
          sqlx database create
          sqlx migrate run --source crates/nyctos-core/migrations
          cargo sqlx prepare --workspace --check

  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: license guard
        run: ./.ci/license-guard.sh
      - name: voice lint
        run: ./.ci/voice-lint.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm run test
