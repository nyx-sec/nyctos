schedule = []

[general]
log_level = "info"

[performance]
max_parallel_scans = 4
scan_timeout_secs = 600

[sandbox]
enabled = true
allow_network = false
backend = "auto"

[ai]
provider = "claude-code"
runtime = "claude-code"
max_concurrent_one_shot = 4

[ui]
listen_addr = "127.0.0.1:8765"
open_browser = true

[triggers]
on_push = false
on_pr = false

[nyx]

[run]
replay_stable_check = false

# Declare projects below. Each project groups one or more repos.
# Scan, run dispatcher, sandbox env-builder, and chain runner all
# operate per project — repos cannot live outside a project.
#
# Replace the local-path values with absolute paths to your own
# checkouts, or delete this block and run `nyx-agent project create`
# / `nyx-agent project add-repo` to drive it from the CLI.

[[project]]
name = "example-app"
description = "Example multi-repo product"
target_base_url = "http://localhost:3000"

  [[project.repo]]
  name = "example-backend"
  i_own_this = true
  enabled = true
  source = { kind = "local-path", path = "/path/to/backend" }

  [[project.repo]]
  name = "example-frontend"
  i_own_this = true
  enabled = true
  source = { kind = "local-path", path = "/path/to/frontend" }
